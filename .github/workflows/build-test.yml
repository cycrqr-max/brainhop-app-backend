name: Build & Test

on:
  push:
    branches:
      - main
      - dev
  pull_request:

permissions: 
  contents: read 
  packages: write 
  id-token: write

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test || echo "No tests defined"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker image
        run: docker build -t ghcr.io/cycrqr-max/brainhop-backend:latest .

      - name: Push Docker image
        run: docker push ghcr.io/cycrqr-max/brainhop-backend:latest